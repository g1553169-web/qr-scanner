<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QRスキャナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:'Hiragino Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:#1a73e8;color:#fff;padding:12px 16px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#close-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}
#video-wrap{position:relative;flex:1;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;display:block}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#frame{width:220px;height:220px;border:3px solid #fff;border-radius:12px;box-shadow:0 0 0 2000px rgba(0,0,0,.45)}
#status{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;text-align:center;padding:10px;font-size:14px}
#result-list{position:absolute;top:0;left:0;right:0;max-height:40%;overflow-y:auto;background:rgba(0,0,0,.85)}
.result-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.15)}
.result-icon{font-size:16px;flex-shrink:0}
.result-text{flex:1;color:#fff;font-size:13px;word-break:break-all}
.result-time{color:rgba(255,255,255,.5);font-size:11px;flex-shrink:0}
#error-box{display:none;position:absolute;inset:0;background:#1a1a1a;padding:24px;flex-direction:column;justify-content:center;align-items:center;text-align:center}
#error-box.show{display:flex}
.err-icon{font-size:48px;margin-bottom:16px}
.err-title{color:#ff6b6b;font-size:17px;font-weight:600;margin-bottom:12px}
.err-steps{color:#ccc;font-size:13px;line-height:1.8;margin-bottom:20px;text-align:left;background:rgba(255,255,255,.05);padding:12px;border-radius:8px;width:100%}
.retry-btn{background:#1a73e8;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
#done-btn{position:absolute;bottom:60px;left:16px;right:16px;background:#34a853;color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;display:none;z-index:10}
</style>
</head>
<body>

<div id="header">
  <span>📷 QRスキャナー</span>
  <button id="close-btn" onclick="closeScanner()">✕ 閉じる</button>
</div>

<div id="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay"><div id="frame"></div></div>
  <div id="result-list"></div>
  <div id="status">カメラを起動中...</div>
  <button id="done-btn" onclick="closeScanner()">✅ 完了（読み取り済み: <span id="done-cnt">0</span>件）</button>
</div>

<div id="error-box">
  <div class="err-icon">📷</div>
  <div class="err-title" id="err-title">カメラエラー</div>
  <div class="err-steps" id="err-steps"></div>
  <button class="retry-btn" onclick="location.reload()">🔄 再試行</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
// URLパラメータからオープナーのオリジンとモードを取得
var params = new URLSearchParams(location.search);
var targetOrigin = params.get('origin') || '*';
var mode = params.get('mode') || 'multi'; // single or multi

var scanned = {};  // 重複防止 {qrId: timestamp}
var COOLDOWN = 3000;
var scanCount = 0;
var video = document.getElementById('video');
var canvas = document.createElement('canvas');
var ctx = canvas.getContext('2d', {willReadFrequently: true});
var raf;

// ── カメラ起動 ──────────────────────────────────────────────────
async function startCamera() {
  var constraints = [
    {video: {facingMode: {ideal: 'environment'}, width: {ideal: 1280}}},
    {video: {facingMode: 'environment'}},
    {video: true}
  ];
  var stream, lastErr;
  for (var i = 0; i < constraints.length; i++) {
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints[i]);
      break;
    } catch(e) {
      lastErr = e;
      if (e.name === 'NotAllowedError') break; // 権限拒否は即エラー
    }
  }
  if (!stream) { showError(lastErr); return; }
  video.srcObject = stream;
  await video.play();
  document.getElementById('status').textContent = 'QRコードをカメラに向けてください';
  requestAnimationFrame(scanLoop);
}

// ── スキャンループ ──────────────────────────────────────────────
function scanLoop() {
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var code = jsQR(img.data, img.width, img.height);
    if (code && code.data) {
      var now = Date.now();
      if (!scanned[code.data] || now - scanned[code.data] > COOLDOWN) {
        scanned[code.data] = now;
        onScan(code.data);
      }
    }
  }
  raf = requestAnimationFrame(scanLoop);
}

// ── スキャン成功 ────────────────────────────────────────────────
function onScan(data) {
  scanCount++;
  // 音（ビープ）
  try {
    var ac = new (window.AudioContext || window.webkitAudioContext)();
    var o = ac.createOscillator();
    var g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = 880; o.type = 'sine';
    g.gain.setValueAtTime(0.3, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    o.start(ac.currentTime); o.stop(ac.currentTime + 0.15);
  } catch(e) {}

  // 結果リストに追加
  var now = new Date();
  var timeStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  var item = document.createElement('div');
  item.className = 'result-item';
  item.innerHTML = '<span class="result-icon">✅</span>'
    + '<span class="result-text">' + data.substring(0, 40) + (data.length > 40 ? '...' : '') + '</span>'
    + '<span class="result-time">' + timeStr + '</span>';
  document.getElementById('result-list').insertBefore(item, document.getElementById('result-list').firstChild);

  // ステータス更新
  document.getElementById('status').textContent = '読み取り済み: ' + scanCount + '件 — 続けてスキャンできます';
  document.getElementById('done-cnt').textContent = scanCount;
  document.getElementById('done-btn').style.display = 'block';

  // オープナーに送信
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({type: 'QR_SCAN', data: data, count: scanCount}, targetOrigin);
  }

  // single モードは1件で自動クローズ
  if (mode === 'single') {
    setTimeout(closeScanner, 800);
  }
}

// ── クローズ ───────────────────────────────────────────────────
function closeScanner() {
  if (raf) cancelAnimationFrame(raf);
  if (video.srcObject) video.srcObject.getTracks().forEach(function(t){ t.stop(); });
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({type: 'QR_CLOSE', count: scanCount}, targetOrigin);
  }
  window.close();
}

// ── エラー表示 ─────────────────────────────────────────────────
function showError(err) {
  var title, steps;
  var isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  var ua = navigator.userAgent;
  var isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
  var browserName = /CriOS/.test(ua)?'Chrome(iOS)':/FxiOS/.test(ua)?'Firefox(iOS)':/Line/.test(ua)?'LINE':isSafari?'Safari':/Chrome/.test(ua)?'Chrome':'ブラウザ';

  if (!err || err.name === 'NotAllowedError') {
    title = '❌ カメラの使用が拒否されています';
    if (isIOS) {
      steps = '① iPhoneの「設定」アプリを開く\n'
        + (isSafari
          ? '② 「Safari」→「カメラ」→「許可」に変更\n'
          : '② 「' + browserName + '」→「カメラ」→「許可」に変更\n'
            + '   ※ iPhoneはSafariを強く推奨\n')
        + '③ この画面を再試行';
    } else {
      steps = '① このページのアドレスバー左の🔒をタップ\n'
        + '② 「カメラ」→「許可」に変更\n'
        + '③ 再試行ボタンを押す';
    }
  } else if (err.name === 'NotFoundError') {
    title = '❌ カメラが見つかりません';
    steps = '・カメラが搭載された端末で開いてください\n・他のアプリがカメラを使用中の場合は終了してください';
  } else if (err.name === 'NotReadableError') {
    title = '⚠️ カメラにアクセスできません';
    steps = '・他のアプリ（カメラ・ビデオ通話等）を終了してください\n・解決しない場合はスマホを再起動してください';
  } else {
    title = '⚠️ カメラエラー: ' + (err ? err.name : '不明');
    steps = err ? err.message : '不明なエラーです\n再試行してください';
  }

  document.getElementById('err-title').textContent = title;
  document.getElementById('err-steps').textContent = steps;
  document.getElementById('error-box').classList.add('show');
  document.getElementById('status').textContent = 'エラー';
}

// ── 起動 ───────────────────────────────────────────────────────
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  showError(null);
} else {
  startCamera().catch(showError);
}

// ── 戻るボタン / ESCキー ────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeScanner();
});
</script>
</body>
</html>
