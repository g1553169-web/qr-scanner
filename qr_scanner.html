<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QRスキャナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;font-family:sans-serif;color:#fff;
  display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#hdr{background:#1a73e8;padding:10px 14px;display:flex;
  justify-content:space-between;align-items:center;flex-shrink:0}
#hdr span{font-size:15px;font-weight:600}
#cb{background:rgba(255,255,255,.2);border:none;color:#fff;
  padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}
#vw{position:relative;flex:1;min-height:0}
video{width:100%;height:100%;object-fit:cover;display:block}
#frame{position:absolute;top:50%;left:50%;
  transform:translate(-50%,-60%);
  width:70vw;height:70vw;max-width:300px;max-height:300px;
  border:4px solid #fff;border-radius:12px;
  box-shadow:0 0 0 2000px rgba(0,0,0,.55)}
@keyframes sc{0%{top:5%}100%{top:88%}}
#sl{position:absolute;left:4%;right:4%;height:3px;
  background:linear-gradient(90deg,transparent,#4af,transparent);
  animation:sc 2s linear infinite}
#rl{position:absolute;top:0;left:0;right:0;max-height:35%;
  overflow-y:auto;background:rgba(0,0,0,.9);z-index:10}
.ri{display:flex;align-items:center;gap:8px;padding:9px 12px;
  border-bottom:1px solid rgba(255,255,255,.1);font-size:12px}
#done{display:none;position:absolute;bottom:8px;left:12px;right:12px;
  background:#34a853;color:#fff;border:none;padding:13px;
  border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;z-index:15}
#st{background:rgba(0,0,0,.75);padding:9px 12px;
  text-align:center;font-size:13px;flex-shrink:0}
#db{background:#111;color:#0f0;font-size:10px;font-family:monospace;
  padding:4px 8px;flex-shrink:0;min-height:20px;word-break:break-all}
#eb{display:none;position:absolute;inset:0;background:#111;z-index:30;
  flex-direction:column;justify-content:center;align-items:center;
  padding:20px;text-align:center}
#eb.on{display:flex}
.et{color:#f66;font-size:16px;font-weight:600;margin-bottom:12px}
.es{color:#ccc;font-size:13px;line-height:1.8;white-space:pre-wrap;
  text-align:left;background:rgba(255,255,255,.06);
  padding:12px;border-radius:8px;width:100%;margin-bottom:16px}
.rb{background:#1a73e8;color:#fff;border:none;padding:12px;
  border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;width:100%;margin-bottom:8px}
</style>
</head>
<body>
<div id="hdr">
  <span>📷 QRスキャナー</span>
  <button id="cb" onclick="closeMe()">✕ 閉じる</button>
</div>
<div id="vw">
  <video id="v" autoplay playsinline muted></video>
  <div id="frame"><div id="sl"></div></div>
  <div id="rl"></div>
  <button id="done" onclick="closeMe()">✅ 完了 (<span id="cnt">0</span>件)</button>
  <div id="eb">
    <div class="et" id="et">エラー</div>
    <div class="es" id="es"></div>
    <button class="rb" onclick="location.reload()">🔄 再試行</button>
    <button class="rb" style="background:#555" onclick="showManual()">⌨️ ID直接入力</button>
  </div>
</div>
<div id="st">起動中...</div>
<div id="db">初期化中...</div>

<script>
var params  = new URLSearchParams(location.search);
var mode    = params.get('mode') || 'multi';
var channel = params.get('ch')   || 'qr_result';  // localStorage チャンネル名

var v    = document.getElementById('v');
var cool = {}, cnt = 0, raf, frames = 0;
var detector = null, jsqrReady = false;
var canvas, ctx;

function dbg(s){ document.getElementById('db').textContent = s; }
function st(s,c){
  var e = document.getElementById('st');
  e.textContent = s;
  if(c){ e.style.background = c; setTimeout(function(){ e.style.background=''; }, 1200); }
}

// ── 送信方法を自動判定 ──────────────────────────────────────────
// 1) postMessage (window.opener が有効な場合)
// 2) localStorage (iPhone Safari などポップアップ制限がある場合)
// 3) BroadcastChannel (対応ブラウザ)
var bc = null;
try { bc = new BroadcastChannel(channel); } catch(e){}

function sendResult(data) {
  var msg = {type: 'QR_SCAN', data: data, count: cnt, ch: channel};
  var sent = false;

  // postMessage
  try {
    if(window.opener && !window.opener.closed){
      window.opener.postMessage(msg, '*');
      sent = true;
    }
  } catch(e){}

  // BroadcastChannel
  if(bc){ try{ bc.postMessage(msg); sent = true; }catch(e){} }

  // localStorage (iPhone Safari 対応)
  try {
    localStorage.setItem(channel, JSON.stringify({
      type:'QR_SCAN', data:data, count:cnt, ts:Date.now()
    }));
    sent = true;
  } catch(e){}

  dbg('📤 送信: ' + data + (sent?' ✅':' ⚠️'));
}

function sendClose() {
  var msg = {type:'QR_CLOSE', count:cnt, ch:channel};
  try{ if(window.opener && !window.opener.closed) window.opener.postMessage(msg,'*'); }catch(e){}
  if(bc){ try{ bc.postMessage(msg); }catch(e){} }
  try{ localStorage.setItem(channel+'_close', JSON.stringify({ts:Date.now()})); }catch(e){}
}

// ── BarcodeDetector (Safari 17+ / Chrome Android) ──────────────
if(window.BarcodeDetector){
  BarcodeDetector.getSupportedFormats().then(function(fmts){
    if(fmts.indexOf('qr_code') >= 0){
      detector = new BarcodeDetector({formats:['qr_code']});
      dbg('✅ BarcodeDetector 使用可');
    }
  }).catch(function(){});
}

// ── jsQR (CDN) ─────────────────────────────────────────────────
var sc = document.createElement('script');
sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
sc.onload  = function(){ jsqrReady = true; dbg('jsQR 読込OK'); };
sc.onerror = function(){
  // フォールバック
  var sc2 = document.createElement('script');
  sc2.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
  sc2.onload = function(){ jsqrReady = true; dbg('jsQR 読込OK (CDN2)'); };
  document.head.appendChild(sc2);
};
document.head.appendChild(sc);

// ── カメラ起動 ──────────────────────────────────────────────────
(async function(){
  st('カメラ接続中...');

  // iPhoneは environment 指定のみ、解像度指定なしの方が安定
  var isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  var tries = isIOS
    ? [
        {video:{facingMode:{exact:'environment'}}},
        {video:{facingMode:'environment'}},
        {video:true}
      ]
    : [
        {video:{facingMode:{ideal:'environment'},width:{ideal:1920}}},
        {video:{facingMode:{ideal:'environment'},width:{ideal:1280}}},
        {video:{facingMode:'environment'}},
        {video:{width:{ideal:1280}}},
        {video:true}
      ];

  var stream, err;
  for(var i = 0; i < tries.length; i++){
    try{
      dbg('カメラ試行 ' + (i+1) + '/' + tries.length);
      stream = await navigator.mediaDevices.getUserMedia(tries[i]);
      break;
    }catch(e){
      err = e;
      if(e.name === 'NotAllowedError') break;
    }
  }
  if(!stream){ showErr(err); return; }

  v.srcObject = stream;

  // iPhone Safari: loadedmetadata を待ってから play()
  await new Promise(function(resolve){
    v.onloadedmetadata = function(){ resolve(); };
    setTimeout(resolve, 3000); // タイムアウト保険
  });

  try{ await v.play(); }catch(e){ dbg('play: '+e.message); }

  canvas = document.createElement('canvas');
  ctx = canvas.getContext('2d', {willReadFrequently:true});

  st('QRコードを枠に入れてください');
  dbg('映像: ' + v.videoWidth + 'x' + v.videoHeight + (isIOS?' [iOS]':''));

  raf = requestAnimationFrame(loop);
})();

// ── スキャンループ ──────────────────────────────────────────────
async function loop(){
  frames++;

  if(v.readyState >= 2 && v.videoWidth > 0){
    canvas.width  = v.videoWidth;
    canvas.height = v.videoHeight;
    ctx.drawImage(v, 0, 0, canvas.width, canvas.height);

    var data = null;

    // BarcodeDetector (3フレームに1回)
    if(detector && frames % 3 === 0){
      try{
        var res = await detector.detect(canvas);
        if(res.length > 0) data = res[0].rawValue;
      }catch(e){}
    }

    // jsQR
    if(!data && jsqrReady){
      try{
        var imgd = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var q = jsQR(imgd.data, imgd.width, imgd.height, {inversionAttempts:'attemptBoth'});
        if(q) data = q.data;
      }catch(e){}
    }

    if(data){
      var now = Date.now();
      if(!cool[data] || now - cool[data] > 2500){
        cool[data] = now;
        onScan(data);
      }
    }

    if(frames % 90 === 0){
      dbg((detector?'BD ':'')+( jsqrReady?'jsQR ':'')+
          'スキャン中 '+canvas.width+'x'+canvas.height+' / '+cnt+'件');
    }
  } else {
    if(frames % 30 === 0) dbg('映像待機 state='+v.readyState+' '+v.videoWidth+'x'+v.videoHeight);
  }

  raf = requestAnimationFrame(loop);
}

// ── 読み取り成功 ────────────────────────────────────────────────
function onScan(data){
  cnt++;
  st('✅ ' + data.substring(0,25), 'rgba(52,168,83,.85)');

  // 効果音
  try{
    var ac = new(window.AudioContext||window.webkitAudioContext)();
    var o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = 880; o.type = 'sine';
    g.gain.setValueAtTime(.4, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+.2);
    o.start(); o.stop(ac.currentTime+.2);
  }catch(e){}

  // 画面フラッシュ
  document.body.style.background = '#34a853';
  setTimeout(function(){ document.body.style.background = '#111'; }, 350);

  // 結果リスト
  var t  = new Date();
  var ts = ('0'+t.getHours()).slice(-2)+':'+('0'+t.getMinutes()).slice(-2)+':'+('0'+t.getSeconds()).slice(-2);
  var el = document.createElement('div'); el.className = 'ri';
  el.innerHTML = '<span style="color:#34a853">✅</span>'
    + '<span style="flex:1;word-break:break-all">'+data.substring(0,50)+'</span>'
    + '<span style="opacity:.5">'+ts+'</span>';
  var rl = document.getElementById('rl');
  rl.insertBefore(el, rl.firstChild);

  document.getElementById('cnt').textContent = cnt;
  document.getElementById('done').style.display = 'block';

  sendResult(data);
  if(mode === 'single') setTimeout(closeMe, 700);
}

// ── 閉じる ─────────────────────────────────────────────────────
function closeMe(){
  if(raf) cancelAnimationFrame(raf);
  if(v.srcObject) v.srcObject.getTracks().forEach(function(t){ t.stop(); });
  sendClose();
  if(bc) bc.close();
  window.close();
  // window.close() が効かない場合（iPhoneなど）は履歴を戻る
  setTimeout(function(){ window.history.back(); }, 300);
}

// ── エラー表示 ─────────────────────────────────────────────────
function showErr(err){
  var isIOS = /iP(hone|od|ad)/.test(navigator.userAgent);
  var ua    = navigator.userAgent;
  var br    = /CriOS/.test(ua)?'Chrome(iOS)':/FxiOS/.test(ua)?'Firefox(iOS)':
              /Safari/.test(ua)&&!/Chrome/.test(ua)?'Safari':'Chrome';
  var title, steps;
  if(!err || err.name === 'NotAllowedError'){
    title = '❌ カメラが許可されていません';
    steps = isIOS
      ? (br === 'Safari'
          ? '① 設定アプリ → Safari → カメラ → 許可\n② ページを再読み込み'
          : '① 設定アプリ → ' + br + ' → カメラ → 許可\n② iPhoneはSafariを推奨\n③ 再試行')
      : '① アドレスバー左の🔒をタップ\n② カメラ → 許可\n③ 再試行';
  } else if(err.name === 'NotFoundError'){
    title = '❌ カメラが見つかりません';
    steps = 'カメラ付きの端末で開いてください';
  } else {
    title = '⚠️ ' + err.name;
    steps = (err.message||'') + '\nブラウザ: ' + br;
  }
  document.getElementById('et').textContent = title;
  document.getElementById('es').textContent = steps;
  document.getElementById('eb').classList.add('on');
  dbg('ERROR: ' + (err ? err.name+' '+err.message : '不明'));
}

function showManual(){
  document.getElementById('eb').classList.remove('on');
  var d = prompt('備品IDを入力してください（例: ET-0001）');
  if(d && d.trim()) onScan(d.trim());
  else document.getElementById('eb').classList.add('on');
}

document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeMe(); });
</script>
</body>
</html>
