<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>QRスキャナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:'Hiragino Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:#1a73e8;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#header span{font-size:14px;font-weight:600}
#close-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:13px;cursor:pointer}
#video-wrap{position:relative;flex:1;overflow:hidden;min-height:0}
#video{width:100%;height:100%;object-fit:cover;display:block}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#frame{width:65vw;height:65vw;max-width:260px;max-height:260px;border:3px solid #fff;border-radius:12px;box-shadow:0 0 0 2000px rgba(0,0,0,.5)}
#hint{color:#fff;font-size:12px;margin-top:12px;text-shadow:0 1px 3px rgba(0,0,0,.8);text-align:center;padding:0 16px}
#status-bar{background:rgba(0,0,0,.75);color:#fff;text-align:center;padding:8px 12px;font-size:13px;flex-shrink:0}
#debug{background:rgba(0,0,0,.7);color:#0f0;font-size:10px;font-family:monospace;padding:4px 8px;flex-shrink:0;min-height:20px;text-align:center}
#result-list{position:absolute;top:0;left:0;right:0;max-height:35%;overflow-y:auto;background:rgba(0,0,0,.88)}
.result-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.r-icon{font-size:14px;flex-shrink:0}
.r-text{flex:1;color:#fff;font-size:12px;word-break:break-all}
.r-time{color:rgba(255,255,255,.5);font-size:10px;flex-shrink:0}
#done-btn{display:none;position:absolute;bottom:8px;left:12px;right:12px;background:#34a853;color:#fff;border:none;padding:12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;z-index:10}
#error-box{display:none;position:absolute;inset:0;background:#111;padding:20px;flex-direction:column;justify-content:center;align-items:center;text-align:center}
#error-box.show{display:flex}
.err-title{color:#ff6b6b;font-size:16px;font-weight:600;margin-bottom:10px}
.err-steps{color:#ccc;font-size:13px;line-height:1.8;margin-bottom:18px;text-align:left;background:rgba(255,255,255,.06);padding:12px;border-radius:8px;width:100%;white-space:pre-wrap}
.retry-btn{background:#1a73e8;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-bottom:8px}
</style>
</head>
<body>

<div id="header">
  <span>📷 QRスキャナー</span>
  <button id="close-btn" onclick="closeScanner()">✕ 閉じる</button>
</div>

<div id="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div id="frame"></div>
    <div id="hint">QRコードを枠の中に入れてください</div>
  </div>
  <div id="result-list"></div>
  <button id="done-btn" onclick="closeScanner()">✅ 完了（<span id="done-cnt">0</span>件）</button>
  <div id="error-box">
    <div class="err-title" id="err-title">カメラエラー</div>
    <div class="err-steps" id="err-steps"></div>
    <button class="retry-btn" onclick="location.reload()">🔄 再試行</button>
  </div>
</div>

<div id="status-bar">カメラを起動中...</div>
<div id="debug">初期化中...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
var params      = new URLSearchParams(location.search);
var targetOrigin= params.get('origin') || '*';
var mode        = params.get('mode')   || 'multi';

var scanned  = {};
var COOLDOWN = 2500;
var scanCount= 0;
var video    = document.getElementById('video');
var canvas   = document.createElement('canvas');
var ctx      = canvas.getContext('2d', {willReadFrequently:true});
var raf, frameCount = 0, lastDetect = 0;

// ── デバッグ表示 ────────────────────────────────────────────────
function dbg(msg) {
  document.getElementById('debug').textContent = msg;
}

// ── カメラ起動 ──────────────────────────────────────────────────
async function startCamera() {
  dbg('getUserMedia 呼び出し中...');
  var constraints = [
    {video:{facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}}},
    {video:{facingMode:'environment'}},
    {video:{width:{ideal:640}}},
    {video:true}
  ];
  var stream, lastErr;
  for (var i=0; i<constraints.length; i++) {
    try {
      dbg('試行 '+(i+1)+'/'+constraints.length+'...');
      stream = await navigator.mediaDevices.getUserMedia(constraints[i]);
      dbg('カメラ取得成功 (試行'+(i+1)+')');
      break;
    } catch(e) {
      lastErr = e;
      dbg('試行'+(i+1)+' 失敗: '+e.name);
      if (e.name === 'NotAllowedError') break;
    }
  }
  if (!stream) { showError(lastErr); return; }

  video.srcObject = stream;
  video.addEventListener('loadedmetadata', function() {
    dbg('映像: '+video.videoWidth+'x'+video.videoHeight+' — スキャン開始');
    document.getElementById('status-bar').textContent = 'QRコードを枠に入れてください';
  });
  await video.play();
  requestAnimationFrame(scanLoop);
}

// ── スキャンループ ──────────────────────────────────────────────
function scanLoop() {
  frameCount++;
  if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // jsQRに渡す前に画像データが正常か確認
    var img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var code = jsQR(img.data, img.width, img.height, {
      inversionAttempts: 'dontInvert'  // 通常のQR（暗色）優先
    });

    if (code && code.data) {
      var now = Date.now();
      if (!scanned[code.data] || now - scanned[code.data] > COOLDOWN) {
        scanned[code.data] = now;
        onScan(code.data);
      }
    }

    // 3秒ごとにデバッグ情報更新
    if (frameCount % 90 === 0) {
      dbg('スキャン中 — '+canvas.width+'x'+canvas.height+' — '+scanCount+'件読取済');
    }
  } else if (frameCount % 30 === 0) {
    dbg('映像待機中 readyState='+video.readyState+' size='+video.videoWidth+'x'+video.videoHeight);
  }
  raf = requestAnimationFrame(scanLoop);
}

// ── スキャン成功 ────────────────────────────────────────────────
function onScan(data) {
  scanCount++;
  dbg('✅ 読取成功! ['+data.substring(0,30)+(data.length>30?'...':'')+'] 計'+scanCount+'件');

  // ビープ音
  try {
    var ac = new (window.AudioContext||window.webkitAudioContext)();
    var o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value=880; o.type='sine';
    g.gain.setValueAtTime(0.4, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.18);
    o.start(ac.currentTime); o.stop(ac.currentTime+0.18);
  } catch(e){}

  // 枠を緑点滅
  var frame = document.getElementById('frame');
  frame.style.borderColor = '#34a853';
  frame.style.boxShadow   = '0 0 0 2000px rgba(0,100,0,.35)';
  setTimeout(function(){
    frame.style.borderColor = '#fff';
    frame.style.boxShadow   = '0 0 0 2000px rgba(0,0,0,.5)';
  }, 400);

  // 結果リスト
  var now = new Date();
  var t   = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  var item = document.createElement('div');
  item.className = 'result-item';
  item.innerHTML = '<span class="r-icon">✅</span>'
    +'<span class="r-text">'+data.substring(0,50)+(data.length>50?'...':'')+'</span>'
    +'<span class="r-time">'+t+'</span>';
  document.getElementById('result-list').insertBefore(item, document.getElementById('result-list').firstChild);

  document.getElementById('status-bar').textContent = '✅ 読み取り済み: '+scanCount+'件 — 続けてスキャンできます';
  document.getElementById('done-cnt').textContent = scanCount;
  document.getElementById('done-btn').style.display = 'block';

  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({type:'QR_SCAN', data:data, count:scanCount}, targetOrigin);
  }
  if (mode === 'single') setTimeout(closeScanner, 700);
}

// ── 閉じる ─────────────────────────────────────────────────────
function closeScanner() {
  if (raf) cancelAnimationFrame(raf);
  if (video.srcObject) video.srcObject.getTracks().forEach(function(t){t.stop();});
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({type:'QR_CLOSE', count:scanCount}, targetOrigin);
  }
  window.close();
}

// ── エラー ─────────────────────────────────────────────────────
function showError(err) {
  var isIOS    = /iP(hone|ad|od)/.test(navigator.userAgent);
  var ua       = navigator.userAgent;
  var isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
  var browser  = /CriOS/.test(ua)?'Chrome(iOS)':/FxiOS/.test(ua)?'Firefox(iOS)':/Line/.test(ua)?'LINE':isSafari?'Safari':/Chrome/.test(ua)?'Chrome':'ブラウザ';
  var name = err ? err.name : 'NotAllowedError';
  var title, steps;

  if (name==='NotAllowedError') {
    title = '❌ カメラの使用が拒否されています';
    if (isIOS) {
      steps = isSafari
        ? '① 設定アプリ → Safari → カメラ → 許可\n② このページを再試行'
        : '① 設定アプリ → '+browser+' → カメラ → 許可\n② ※iPhoneはSafariを推奨\n③ このページを再試行';
    } else {
      steps = '① アドレスバー左の🔒をタップ\n② 「カメラ」→「許可」\n③ 再試行';
    }
  } else if (name==='NotFoundError') {
    title='❌ カメラが見つかりません';
    steps='カメラ搭載端末で開いてください\n他のアプリがカメラ使用中の場合は終了してください';
  } else if (name==='NotReadableError') {
    title='⚠️ カメラにアクセスできません';
    steps='他のアプリ（カメラ・ビデオ通話）を終了してください\n解決しない場合はスマホを再起動してください';
  } else {
    title='⚠️ カメラエラー: '+(err?err.name:'不明');
    steps=(err?err.message:'不明なエラー')+'\n\nブラウザ: '+browser+'\nHTTPS: '+(location.protocol==='https:'?'✓':'✗')+'\n\n再試行してください';
  }
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-steps').textContent = steps;
  document.getElementById('error-box').classList.add('show');
  document.getElementById('status-bar').textContent = 'エラー';
  dbg('ERROR: '+name+(err?' — '+err.message:''));
}

// ── 起動 ───────────────────────────────────────────────────────
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  showError(null);
} else {
  startCamera().catch(showError);
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeScanner(); });
</script>
</body>
</html>
